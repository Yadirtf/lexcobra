# ═══════════════════════════════════════════════════════════════
#  LexCobra — Docker Compose (Desarrollo Local)
#  Servicios: PostgreSQL 16 + Redis 7
# ═══════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: lexcobra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexcobra_db
      POSTGRES_USER: lexcobra_user
      POSTGRES_PASSWORD: lexcobra_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexcobra_user -d lexcobra_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: lexcobra_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
